            {{#normalize_evidence.normalized_evidence_context#}}


            请优先读取 normalized_evidence_context.planning_constraints.selected_design，直接将选中设计扩展成最终计划。

            保留选中设计的 candidate_id、设计类型、变量、基线、指标、步骤和证伪逻辑；仅补齐最终 schema 所需细节。


            输出必须是单个 experiment_planner_plan_result_v1 JSON，plan 必须包含：

            problem_statement, rationale, technical_details, datasets, paper_title,
            paper_abstract, methods, experiments, results, references, feedback_tasks,
