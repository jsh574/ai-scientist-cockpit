    - data:
        code: |
          import json

          def _loads(value, default):
              if value is None or value == "":
                  return default
              if isinstance(value, (dict, list)):
                  return value
              try:
                  return json.loads(value)
              except Exception:
                  return default

          def _as_list(value):
              return value if isinstance(value, list) else []

          def _compact_literature(item):
              return {
                  "literature_id": item.get("literature_id", "unknown"),
                  "title": item.get("title", "unknown"),
                  "authors": _as_list(item.get("authors")),
                  "year": item.get("year", "unknown"),
                  "doi": item.get("doi", ""),
                  "url": item.get("url", ""),
              }

          def _compact_evidence(item, direction):
              return {
                  "direction": direction,
                  "evidence_id": item.get("evidence_id", "unknown"),
                  "claim": item.get("claim", ""),
                  "summary": item.get("summary", ""),
                  "source_literature_id": item.get("source_literature_id", ""),
                  "support_direction": item.get("support_direction", direction),
                  "strength_score": item.get("strength_score", 0),
              }

          def main(question_card: str, hypothesis_id: str, hypothesis_evidence_package: str, planning_constraints: str = "", user_constraints: str = "") -> dict:
              question = _loads(question_card, {})
              package = _loads(hypothesis_evidence_package, {})
              constraints = _loads(planning_constraints, {})
              user = _loads(user_constraints, {})
              evidence_subset = package.get("evidence_subset", {}) if isinstance(package, dict) else {}

              evidence_rows = []
              for key, direction in (
                  ("supporting_evidence", "supporting"),
                  ("opposing_evidence", "opposing"),
                  ("uncertain_evidence", "uncertain"),
              ):
                  for item in _as_list(evidence_subset.get(key)):
                      if isinstance(item, dict):
                          evidence_rows.append(_compact_evidence(item, direction))

              source_literature = [
                  _compact_literature(item)
                  for item in _as_list(package.get("source_literature"))
                  if isinstance(item, dict)
              ]
              knowledge_gaps = [
                  item.get("description", str(item)) if isinstance(item, dict) else str(item)
                  for item in _as_list(package.get("knowledge_gaps"))
              ]

              normalized = {
                  "task_scope": {
                      "hypothesis_id": hypothesis_id or package.get("hypothesis_id", "unknown"),
                      "core_question": question.get("core_question", "unknown"),
                      "domain": question.get("domain", []),
                      "research_object": question.get("research_object", {}),
                      "hypothesis": package.get("hypothesis", "unknown"),
                      "rationale": package.get("rationale", ""),
                      "target_variables": package.get("target_variables", []),
                      "expected_observation": package.get("expected_observation", ""),
                      "validation_idea": package.get("validation_idea", ""),
                  },
                  "scores": package.get("scores", {}),
                  "evidence_rows": evidence_rows,
                  "source_literature": source_literature,
                  "knowledge_gaps": knowledge_gaps,
                  "limitations": package.get("limitations", []),
                  "needs_more_evidence": bool(package.get("needs_more_evidence", False)),
                  "planning_constraints": constraints,
                  "user_constraints": user,
                  "guardrails": {
                      "allowed_evidence_ids": [row.get("evidence_id") for row in evidence_rows],
                      "allowed_source_ids": [item.get("literature_id") for item in source_literature],
                      "forbidden_actions": constraints.get("forbidden_actions", []),
                      "allowed_validation_types": constraints.get("allowed_validation_types", []),
                  },
              }
              return {"normalized_evidence_context": json.dumps(normalized, ensure_ascii=False)}
        code_language: python3
        desc: Parses the single hypothesis package and produces a compact evidence table for downstream LLM nodes.
        outputs:
          normalized_evidence_context:
            children: null
            type: string
