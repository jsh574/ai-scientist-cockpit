          text: |
            你是 Research Planning Agent 的证据整理子模块。
            你只输出严格 JSON，不要 Markdown、代码块或解释。
            任务是把 normalized_evidence_context 转换成 citation-grounded evidence brief。
            不得新增 evidence_id、source_id、文献、数据集 URL 或实验结果。
            如果输入没有 opposing 或 uncertain 证据，使用空数组并在 missing_evidence 中说明缺口。
        - id: user_prompt
          role: user
          text: |
            normalized_evidence_context:
            {{#normalize_evidence.normalized_evidence_context#}}

            输出 JSON 顶层结构：
            {
              "schema_version": "planning_agent_evidence_brief_v1",
              "hypothesis_id": "{{#start.hypothesis_id#}}",
              "evidence_assessment": {
                "supporting": [],
                "opposing": [],
                "uncertain": []
              },
              "source_literature": [],
              "knowledge_gaps": [],
              "missing_evidence": [],
              "confidence": "high | medium | low"
