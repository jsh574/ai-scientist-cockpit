    - data:
        code: |
          import json

          def _loads(value, default):
              if isinstance(value, (dict, list)):
                  return value
              try:
                  return json.loads(value or "")
              except Exception:
                  return default

          def _as_list(value):
              return value if isinstance(value, list) else []

          def _string_ids(values):
              return {value for value in _as_list(values) if isinstance(value, str) and value}

          def main(plan_payload: dict, normalized_evidence_context: str,
                   task_id: str, iteration: int, hypothesis_id: str) -> dict:
              plan_result = _loads(plan_payload, {})
              context = _loads(normalized_evidence_context, {})
              issues = []
              if not isinstance(plan_result, dict):
                  plan_result = {}
                  issues.append("plan_result must be an object")
              if not isinstance(context, dict):
                  context = {}
              normalized_identity_fields = []
              expected_identity = {
                  "schema_version": "experiment_planner_plan_result_v1",
                  "agent_name": "ExperimentPlannerAgent",
                  "task_id": task_id,
                  "iteration": iteration,
                  "hypothesis_id": hypothesis_id
              }
              for field, expected in expected_identity.items():
                  if plan_result.get(field) != expected:
                      normalized_identity_fields.append(field)
                  plan_result[field] = expected

              plan = plan_result.get("plan")
              if not isinstance(plan, dict):
                  plan = {}
                  plan_result["plan"] = plan
                  issues.append("plan must be an object")

              guardrails = context.get("guardrails", {})
              if not isinstance(guardrails, dict):
                  guardrails = {}
              allowed_evidence = _string_ids(guardrails.get("allowed_evidence_ids"))
              allowed_sources = _string_ids(guardrails.get("allowed_source_ids"))
              referenced_evidence = set()
              referenced_sources = set()

              rationale = plan.get("rationale", {})
              if isinstance(rationale, dict):
                  for item in _as_list(rationale.get("logic_chain")):
                      if isinstance(item, dict):
                          referenced_evidence.update(_string_ids(item.get("evidence_ids")))
                          referenced_sources.update(_string_ids(item.get("source_ids")))
              for item in _as_list(plan.get("references")):
                  if isinstance(item, dict):
                      source_id = item.get("source_id")
                      if isinstance(source_id, str) and source_id:
                          referenced_sources.add(source_id)

              unknown_evidence_ids = sorted(referenced_evidence - allowed_evidence)
              unknown_source_ids = sorted(referenced_sources - allowed_sources)
              if unknown_evidence_ids:
                  issues.append("unknown evidence_ids: " + ", ".join(unknown_evidence_ids))
              if unknown_source_ids:
                  issues.append("unknown source_ids: " + ", ".join(unknown_source_ids))
              if issues:
                  plan_result["status"] = "failed"
                  plan_result["error_message"] = "; ".join(issues)
              report = {
                  "passed": not issues,
                  "issues": issues,
                  "normalized_identity_fields": normalized_identity_fields,
                  "allowed_evidence_count": len(allowed_evidence),
                  "allowed_source_count": len(allowed_sources),
                  "unknown_evidence_ids": unknown_evidence_ids,
                  "unknown_source_ids": unknown_source_ids
              }
              return {
                  "plan_result": json.dumps(plan_result, ensure_ascii=False),
                  "contract_report": json.dumps(report, ensure_ascii=False)
              }
        code_language: python3
        desc: Normalizes identity fields and validates final evidence/source references against deterministic allowlists.
