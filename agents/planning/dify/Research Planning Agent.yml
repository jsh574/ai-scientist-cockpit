          \    except Exception:\n        return default\n\ndef _as_list(value):\n\
          \    return value if isinstance(value, list) else []\n\ndef _compact_literature(item):\n\
          \    return {\n        \"literature_id\": item.get(\"literature_id\", \"\
          unknown\"),\n        \"title\": item.get(\"title\", \"unknown\"),\n    \
          \    \"authors\": _as_list(item.get(\"authors\")),\n        \"year\": item.get(\"\
          year\", \"unknown\"),\n        \"doi\": item.get(\"doi\", \"\"),\n     \
          \   \"url\": item.get(\"url\", \"\"),\n    }\n\ndef _compact_evidence(item,\
          \ direction):\n    return {\n        \"direction\": direction,\n       \
          \ \"evidence_id\": item.get(\"evidence_id\", \"unknown\"),\n        \"claim\"\
          : item.get(\"claim\", \"\"),\n        \"summary\": item.get(\"summary\"\
          , \"\"),\n        \"source_literature_id\": item.get(\"source_literature_id\"\
          , \"\"),\n        \"support_direction\": item.get(\"support_direction\"\
          , direction),\n        \"strength_score\": item.get(\"strength_score\",\
          \ 0),\n    }\n\ndef main(question_card: str, hypothesis_id: str, hypothesis_evidence_package:\
          \ str, planning_constraints: str = \"\", user_constraints: str = \"\") ->\
          \ dict:\n    question = _loads(question_card, {})\n    package = _loads(hypothesis_evidence_package,\
          \ {})\n    constraints = _loads(planning_constraints, {})\n    user = _loads(user_constraints,\
          \ {})\n    evidence_subset = package.get(\"evidence_subset\", {}) if isinstance(package,\
          \ dict) else {}\n\n    evidence_rows = []\n    for key, direction in (\n\
          \        (\"supporting_evidence\", \"supporting\"),\n        (\"opposing_evidence\"\
          , \"opposing\"),\n        (\"uncertain_evidence\", \"uncertain\"),\n   \
          \ ):\n        for item in _as_list(evidence_subset.get(key)):\n        \
          \    if isinstance(item, dict):\n                evidence_rows.append(_compact_evidence(item,\
          \ direction))\n\n    source_literature = [\n        _compact_literature(item)\n\
          \        for item in _as_list(package.get(\"source_literature\"))\n    \
          \    if isinstance(item, dict)\n    ]\n    knowledge_gaps = [\n        item.get(\"\
          description\", str(item)) if isinstance(item, dict) else str(item)\n   \
          \     for item in _as_list(package.get(\"knowledge_gaps\"))\n    ]\n\n \
          \   normalized = {\n        \"task_scope\": {\n            \"hypothesis_id\"\
          : hypothesis_id or package.get(\"hypothesis_id\", \"unknown\"),\n      \
          \      \"core_question\": question.get(\"core_question\", \"unknown\"),\n\
          \            \"domain\": question.get(\"domain\", []),\n            \"research_object\"\
          : question.get(\"research_object\", {}),\n            \"hypothesis\": package.get(\"\
          hypothesis\", \"unknown\"),\n            \"rationale\": package.get(\"rationale\"\
          , \"\"),\n            \"target_variables\": package.get(\"target_variables\"\
          , []),\n            \"expected_observation\": package.get(\"expected_observation\"\
          , \"\"),\n            \"validation_idea\": package.get(\"validation_idea\"\
          , \"\"),\n        },\n        \"scores\": package.get(\"scores\", {}),\n\
          \        \"evidence_rows\": evidence_rows,\n        \"source_literature\"\
          : source_literature,\n        \"knowledge_gaps\": knowledge_gaps,\n    \
          \    \"limitations\": package.get(\"limitations\", []),\n        \"needs_more_evidence\"\
          : bool(package.get(\"needs_more_evidence\", False)),\n        \"planning_constraints\"\
          : constraints,\n        \"user_constraints\": user,\n        \"guardrails\"\
          : {\n            \"allowed_evidence_ids\": [row.get(\"evidence_id\") for\
          \ row in evidence_rows],\n            \"allowed_source_ids\": [item.get(\"\
          literature_id\") for item in source_literature],\n            \"forbidden_actions\"\
          : constraints.get(\"forbidden_actions\", []),\n            \"allowed_validation_types\"\
          : constraints.get(\"allowed_validation_types\", []),\n        },\n    }\n\
          \    return {\"normalized_evidence_context\": json.dumps(normalized, ensure_ascii=False)}\n"
