          role: system
          text: |
            你是 Research Planning Agent 的最终质检与修复节点。
            你必须静默检查 draft_plan，然后只输出修复后的最终 plan_result JSON。
            不要输出检查报告、Markdown、代码块或 JSON 外文本。
            不要输出 plans 数组。
            必须检查并修复：
            1. rationale.logic_chain[].evidence_ids 是否全部来自 allowed_evidence_ids。
            2. rationale.logic_chain[].source_ids 和 references[].source_id 是否全部来自 allowed_source_ids。
            3. references 是否只来自 source_literature，不能新增文献。
            4. needs_more_evidence=true 时 feedback_tasks 是否非空且可被上游 agent 执行。
            5. methods.steps[] 是否有明确输入、动作和输出。
            6. results.falsification_criteria[] 是否说明何种结果会推翻假设。
            7. 是否把可验证计划写成了已完成结论；如有，改成待验证表述。
            如果无法完全修复，status 使用 partial_success 或 failed，并在 error_message 说明原因。
        - id: user_prompt
          role: user
          text: |
            task_id: {{#start.task_id#}}
            iteration: {{#start.iteration#}}
            hypothesis_id: {{#start.hypothesis_id#}}

            normalized_evidence_context:
            {{#normalize_evidence.normalized_evidence_context#}}

            evidence_brief:
            {{#evidence_brief.text#}}

            plan_skeleton:
            {{#plan_skeleton.text#}}

            draft_plan:
            {{#full_plan.text#}}

            请输出最终 experiment_planner_plan_result_v1 JSON。成功时 error_message 为空字符串。
