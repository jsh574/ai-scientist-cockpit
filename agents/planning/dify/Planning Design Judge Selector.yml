    nodes:
    - data:
        desc: Receives several design_candidate JSON objects for one existing hypothesis.
        selected: false
        title: Start
        type: start
        variables:
        - label: task_id
          max_length: 128
          options: []
          required: true
          type: text-input
          variable: task_id
        - label: iteration
          max_length: 32
          options: []
          required: true
          type: number
          variable: iteration
        - label: hypothesis_id
          max_length: 128
          options: []
          required: true
          type: text-input
          variable: hypothesis_id
        - label: design_candidates
          max_length: 100000
          options: []
          required: true
          type: paragraph
          variable: design_candidates
        - label: hypothesis_evidence_package
          max_length: 50000
          options: []
          required: false
          type: paragraph
          variable: hypothesis_evidence_package
        - label: planning_constraints
          max_length: 16000
          options: []
          required: false
          type: paragraph
          variable: planning_constraints
        - label: user_constraints
          max_length: 12000
          options: []
          required: false
          type: paragraph
          variable: user_constraints
      height: 325
      id: start
      position:
        x: 80
        y: 240
      positionAbsolute:
        x: 80
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: |
          import json

          def _loads(value, default):
              if isinstance(value, (dict, list)):
                  return value
              try:
                  return json.loads(value or "")
              except Exception:
                  return default

          def _list(value):
              return value if isinstance(value, list) else []

          def main(task_id: str, iteration: int, hypothesis_id: str, design_candidates: str,
                   hypothesis_evidence_package: str = "", planning_constraints: str = "",
                   user_constraints: str = "") -> dict:
              candidates = _loads(design_candidates, [])
              if isinstance(candidates, dict):
                  candidates = candidates.get("candidates", [])
              if not isinstance(candidates, list):
                  candidates = []
              package = _loads(hypothesis_evidence_package, {})
              constraints = _loads(planning_constraints, {})
              user = _loads(user_constraints, {})
              if not isinstance(package, dict):
                  package = {}
              if not isinstance(constraints, dict):
                  constraints = {}
              if not isinstance(user, dict):
                  user = {}
              allowed_evidence = []
              allowed_sources = []
              subset = package.get("evidence_subset", {})
              if isinstance(subset, dict):
                  for key in ("supporting_evidence", "opposing_evidence", "uncertain_evidence"):
                      for item in _list(subset.get(key)):
                          if isinstance(item, dict) and item.get("evidence_id"):
                              allowed_evidence.append(item.get("evidence_id"))
              for item in _list(package.get("source_literature")):
                  if isinstance(item, dict) and item.get("literature_id"):
                      allowed_sources.append(item.get("literature_id"))
              rubric = {
                  "hard_gates": [
                      "hypothesis_id must match the input",
                      "all evidence_id/source_id values must be from the allowlists",
                      "method_steps, metrics, and falsification_matrix must be non-empty",
                      "no fabricated execution, reference, dataset URL, or forbidden action"
                  ],
                  "soft_dimensions": [
                      "hypothesis_alignment",
                      "evidence_traceability",
                      "method_and_statistics",
                      "data_feasibility",
                      "falsifiability",
                      "resource_and_risk",
                      "iteration_readiness"
                  ],
                  "decision_policy": {
                      "max_revisions": 1,
                      "tie_or_disagreement": "human_review",
                      "missing_evidence": "feedback_required"
                  }
              }
              context = {
                  "task_id": task_id,
                  "iteration": iteration,
                  "hypothesis_id": hypothesis_id,
                  "hypothesis": package.get("hypothesis", ""),
                  "rationale": package.get("rationale", ""),
                  "needs_more_evidence": bool(package.get("needs_more_evidence", False)),
                  "allowed_evidence_ids": sorted(set(allowed_evidence)),
                  "allowed_source_ids": sorted(set(allowed_sources)),
                  "planning_constraints": constraints,
                  "user_constraints": user,
                  "rubric": rubric,
                  "candidates": candidates
              }
              return {"selection_context": json.dumps(context, ensure_ascii=False)}
        code_language: python3
        desc: Builds a compact selection context and explicit rubric for the judge.
        outputs:
          selection_context:
            children: null
            type: string
        selected: false
        title: Prepare Selection Context
        type: code
        variables:
        - value_selector:
          - start
          - task_id
          variable: task_id
        - value_selector:
          - start
          - iteration
          variable: iteration
        - value_selector:
          - start
          - hypothesis_id
          variable: hypothesis_id
        - value_selector:
