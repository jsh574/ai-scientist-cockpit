services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - backend/.env
    environment:
      ARTIFACTS_ROOT: /app/artifacts/tasks
    ports:
      - "8000:8000"
    volumes:
      - scientist_artifacts:/app/artifacts/tasks

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  scientist_artifacts:
